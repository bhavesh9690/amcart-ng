<div class="product-item" [class.out-of-stock]="!product.inStock">
  <div class="product-thumb">
    <a [routerLink]="['/product', product.id]">
      <img [src]="product.imageUrl" [alt]="product.name"
           (error)="onImgError($event)"
           style="width:100%;height:220px;object-fit:cover">
    </a>
    <div class="product-badges">
      <span *ngIf="product.salePrice" class="badge-sale">SALE</span>
      <span *ngIf="product.isNewArrival" class="badge-new">NEW</span>
      <span *ngIf="!product.inStock" class="badge-sold-out">SOLD OUT</span>
    </div>
    <div class="product-actions">
      <button class="action-btn" title="Add to Cart"
                [disabled]="!product.inStock"
                (click)="addToCart()">
          <i class="icon-bag"></i>
        </button>
      <button class="action-btn" title="Add to Wishlist">
        <i class="icon-heart"></i>
      </button>
      <button class="action-btn" title="Quick View">
        <i class="icon-magnifier"></i>
      </button>
    </div>
  </div>
  <div class="product-info">
    <h3 class="product-name">
      <a [routerLink]="['/product', product.id]">{{ product.name }}</a>
    </h3>
    <div class="product-rating">
      <span *ngFor="let s of stars" class="star" [class.filled]="s <= product.rating">&#9733;</span>
      <span class="review-count">({{ product.reviewCount }})</span>
    </div>
    <div class="product-price">
      <span *ngIf="product.salePrice" class="price-sale">{{ product.salePrice | currency:'USD':'symbol':'1.2-2' }}</span>
      <span [class.price-original]="!!product.salePrice" [class.price-normal]="!product.salePrice">
        {{ product.price | currency:'USD':'symbol':'1.2-2' }}
      </span>
    </div>
  </div>
</div>
