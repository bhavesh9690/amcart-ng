<div style="background:#eeeeee;padding:60px 0;min-height:70vh">
  <div class="container">
    <ul style="list-style:none;margin:0 0 20px;padding:0;display:flex;gap:8px;font-size:13px;color:#888">
      <li><a routerLink="/" style="color:#e63e3e;text-decoration:none">Home</a></li>
      <li style="color:#ccc">/</li>
      <li style="color:#444">Verify Email</li>
    </ul>

    <div style="display:flex;justify-content:center">
      <div style="width:100%;max-width:460px">
        <div style="background:#fff;padding:40px;border:1px solid #ddd;border-radius:4px">
          <h2 style="font-size:22px;font-weight:700;color:#333;margin:0 0 8px;text-align:center">Verify Your Email</h2>
          <p style="font-size:13px;color:#666;text-align:center;margin:0 0 24px">
            A verification code was sent to <strong>{{ prefillEmail }}</strong>.<br>
            Enter the code below to activate your account.
          </p>

          <form [formGroup]="confirmForm" (ngSubmit)="onConfirm()" novalidate>
            <!-- Email (editable in case user navigated here directly) -->
            <div style="margin-bottom:16px">
              <input type="email" formControlName="email" placeholder="Email Address *"
                style="width:100%;padding:11px 13px;border:1px solid #ddd;border-radius:4px;font-size:14px;outline:none;box-sizing:border-box"
                [style.border-color]="f['email'].invalid && f['email'].touched ? '#e63e3e' : '#ddd'">
              <div *ngIf="f['email'].invalid && f['email'].touched"
                   style="color:#e63e3e;font-size:12px;margin-top:4px">Enter a valid email.</div>
            </div>

            <!-- Verification code -->
            <div style="margin-bottom:24px">
              <input type="text" formControlName="code" placeholder="Verification Code *"
                maxlength="6" autocomplete="one-time-code"
                style="width:100%;padding:11px 13px;border:1px solid #ddd;border-radius:4px;font-size:14px;outline:none;letter-spacing:4px;text-align:center;box-sizing:border-box"
                [style.border-color]="f['code'].invalid && f['code'].touched ? '#e63e3e' : '#ddd'">
              <div *ngIf="f['code'].invalid && f['code'].touched"
                   style="color:#e63e3e;font-size:12px;margin-top:4px">Please enter the 6-digit code.</div>
            </div>

            <div *ngIf="error$ | async as err"
                 style="background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;padding:10px 14px;border-radius:4px;font-size:13px;margin-bottom:16px">
              {{ err }}
            </div>

            <button type="submit"
              [disabled]="confirmForm.invalid || (loading$ | async)"
              style="width:100%;padding:13px;background:#e63e3e;color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.5px"
              [style.opacity]="confirmForm.invalid || (loading$ | async) ? '0.6' : '1'">
              {{ (loading$ | async) ? 'Verifying...' : 'Verify Account' }}
            </button>
          </form>

          <div style="text-align:center;margin-top:20px;font-size:13px;color:#666">
            Already verified? <a routerLink="/auth/login" style="color:#e63e3e;text-decoration:none">Sign In</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
